name: Mirror to Client Repo

on:
  push:
    branches:
      - main

jobs:
  mirror-git:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # This line is crucial: it prevents the default token from interfering
          persist-credentials: false 

      - name: Sync to Client
        env:
          SYNC_TOKEN: ${{ secrets.CLIENT_REPO_TOKEN }}
        run: |
          # 1. Setup Git identity
          git config --global user.email "bot@kinstel-solutions.com"
          git config --global user.name "Kinstel Sync Bot"
          
          # 2. Add the client repository with the token embedded correctly
          # We use the token as the 'username' for HTTPS auth
          git remote add client https://x-access-token:$SYNC_TOKEN@github.com/jbcpl0601/gold-coast-cleaners.git
          
          # 3. Force push to the client's main branch
          git push client main --force
